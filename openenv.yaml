name: contract-env
version: "1.0.0"
description: |
  Legal contract negotiation RL environment where AI agents negotiate business
  contracts on behalf of two parties with private constraints. Agents argue,
  propose redlines, and reach agreement autonomously — neither side sees the
  other's private rules. Built for Meta/Scaler OpenEnv Hackathon 2026.
author: "ContractEnv Team"
license: MIT
tags: [openenv, legal, negotiation, enterprise, nlp, rl, multi-agent, contract]
tasks:
  - id: task1
    name: "Clause Identification"
    difficulty: easy
    target_score: 0.85
    max_turns: 20
    description: "Agent identifies which of 6 NDA clauses are fair, unfair, or neutral"
  - id: task2
    name: "Clause Redlining"
    difficulty: medium
    target_score: 0.65
    max_turns: 30
    description: "Agent proposes improved replacement text for unfair clauses"
  - id: task3
    name: "Full Negotiation"
    difficulty: hard
    target_score: 0.45
    max_turns: 50
    description: "Agent negotiates multi-turn with scripted counterparty using private constraints"
api:
  base_url: "http://localhost:7860"
  reset: "POST /reset"
  step: "POST /step"
  state: "GET /state"
  tasks: "GET /tasks"
  health: "GET /health"
  grade: "POST /grade"
  session_create: "POST /session/create"
  session_join: "POST /session/join"
  session_start: "POST /session/start"
  session_status: "GET /session/status"
  session_sign: "POST /session/sign"
reward:
  min: -1.0
  max: 1.0
  partial_credit: true
  dense: true
infrastructure:
  min_memory_gb: 2
  min_cpu: 1
  max_inference_minutes: 20
  port: 7860
  python_version: "3.11"
environment_variables:
  API_BASE_URL: "LLM API endpoint"
  MODEL_NAME: "Model identifier"
  HF_TOKEN: "Hugging Face API token"
  SESSION_SECRET: "Secret key for session token generation"
